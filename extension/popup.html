<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    padding: 12px;
    background: #fafafa;
    color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1e1e1e; color: #e0e0e0; }
    .btn { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    .btn:hover { background: #333; }
    .stream .url { color: #999; }
  }
  .header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .btn {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    transition: background 0.15s;
  }
  .btn:hover { background: #f0f0f0; }
  .stream {
    margin-bottom: 6px;
  }
  .stream .source {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .stream .url {
    font-size: 11px;
    color: #555;
    word-break: break-all;
    line-height: 1.3;
  }
  .section-title {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .empty {
    color: #999;
    font-size: 13px;
    text-align: center;
    padding: 16px 0;
  }
  .added {
    background: #e8f5e9 !important;
    border-color: #4caf50 !important;
    pointer-events: none;
  }
  .btn-rescan {
    padding: 4px 14px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #888;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .btn-rescan:hover { color: #1a1a1a; }
  @media (prefers-color-scheme: dark) {
    .btn-rescan:hover { color: #e0e0e0; }
  }
</style>
</head>
<body>
  <div class="header"><img src="icons/icon16.png" width="16" height="16" alt="">Radio</div>
  <div id="streams"><div class="empty">Scanning...</div></div>
  <script src="popup.js"></script>
</body>
</html>
